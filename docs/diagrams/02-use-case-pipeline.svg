<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1020" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <title>GenerateFreezeReport — 3-phase async pipeline (RFC-0025)</title>
  <desc>
    Top-to-bottom flow of the GenerateFreezeReport use case as restructured
    by RFC-0025. Phase 0 runs sequentially because every Phase 1 adapter
    consumes the enriched catalog. Phase 1 fans six independent adapters
    out concurrently via asyncio.gather, collapsing what was sum(t_i) into
    max(t_i) wall-clock. Phase 1.5 merges scanner-emitted findings into
    the health-findings channel post fan-out. Phase 2 is the only consumer
    that depends on every Phase 1 output. Empirical: 12.5 s → 9.74 s
    cold-cache on a 170-library catalog.
  </desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a8a3e"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 20px; font-weight: 600; fill: #1a1a1a; }
    .subtitle { font-size: 12px; fill: #555; }
    .phase-title { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
    .phase-note { font-size: 11px; font-style: italic; fill: #555; }
    .step { font-size: 12px; fill: #1a1a1a; font-family: monospace; }
    .step-out { font-size: 10px; fill: #555; font-style: italic; }
    .badge { font-size: 10px; fill: #fff; font-weight: 700; }
  </style>

  <text x="40" y="40" class="title">GenerateFreezeReport — 3-phase async pipeline</text>
  <text x="40" y="60" class="subtitle">RFC-0025 · src/gradle_deps_monitor/application/generate_freeze_report.py · cold-cache 12.5 s → 9.74 s on 170-lib catalog</text>

  <!-- Input -->
  <g>
    <rect x="440" y="85" width="200" height="40" rx="6" fill="#f4f4f4" stroke="#666"/>
    <text x="540" y="110" class="step" text-anchor="middle">execute(catalog_path)</text>
  </g>
  <line x1="540" y1="125" x2="540" y2="155" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 0 — sequential prelude -->
  <g>
    <rect x="60" y="155" width="960" height="220" rx="10" fill="#fff7ec" stroke="#c89030" stroke-width="2"/>
    <rect x="60" y="155" width="170" height="26" rx="4" fill="#c89030"/>
    <text x="68" y="174" class="badge">PHASE 0 — SEQUENTIAL</text>
    <text x="240" y="174" class="phase-note">parser + BoM enrichment + cheap sync checks. Every downstream adapter reads the enriched catalog.</text>

    <!-- Sequential boxes -->
    <g>
      <rect x="90" y="200" width="280" height="40" rx="5" fill="#fff" stroke="#888"/>
      <text x="100" y="220" class="step">catalog = parser.parse(catalog_path)</text>
      <text x="100" y="234" class="step-out">→ Catalog</text>
    </g>
    <line x1="230" y1="240" x2="230" y2="260" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

    <g>
      <rect x="90" y="260" width="280" height="40" rx="5" fill="#fff" stroke="#888"/>
      <text x="100" y="280" class="step">await bom_resolver.resolve(bom_libs)</text>
      <text x="100" y="294" class="step-out">→ enrich_catalog_with_boms()</text>
    </g>
    <line x1="230" y1="300" x2="230" y2="320" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

    <g>
      <rect x="90" y="320" width="280" height="40" rx="5" fill="#fff" stroke="#888"/>
      <text x="100" y="340" class="step">findings = health_checker(catalog)</text>
      <text x="100" y="354" class="step-out">→ tuple[Finding, ...]</text>
    </g>

    <!-- Sync sibling: compliance + toolchain -->
    <g>
      <rect x="410" y="260" width="280" height="40" rx="5" fill="#fff" stroke="#888"/>
      <text x="420" y="280" class="step">compliance_checker.check(catalog)</text>
      <text x="420" y="294" class="step-out">→ tuple[ComplianceFinding, ...]</text>
    </g>

    <g>
      <rect x="410" y="320" width="280" height="40" rx="5" fill="#fff" stroke="#888"/>
      <text x="420" y="340" class="step">toolchain_checker.check(catalog)</text>
      <text x="420" y="354" class="step-out">→ tuple[ToolchainFinding, ...]</text>
    </g>

    <!-- Right-side note -->
    <text x="730" y="220" class="step-out">3 synchronous</text>
    <text x="730" y="234" class="step-out">checks — microsecond</text>
    <text x="730" y="248" class="step-out">cost; kept in Phase 0</text>
    <text x="730" y="262" class="step-out">rather than wrapped in</text>
    <text x="730" y="276" class="step-out">asyncio.to_thread.</text>
  </g>

  <line x1="540" y1="375" x2="540" y2="405" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 1 — parallel fan-out -->
  <g>
    <rect x="60" y="405" width="960" height="270" rx="10" fill="#e8f4f8" stroke="#3a7da0" stroke-width="2"/>
    <rect x="60" y="405" width="180" height="26" rx="4" fill="#3a7da0"/>
    <text x="68" y="424" class="badge">PHASE 1 — PARALLEL</text>
    <text x="250" y="424" class="phase-note">await asyncio.gather(…) over 6 independent adapters · wall-clock collapses sum(t_i) → max(t_i)</text>

    <!-- gather diamond -->
    <g>
      <path d="M 540,445 L 580,475 L 540,505 L 500,475 Z" fill="#3a7da0"/>
      <text x="540" y="480" class="badge" text-anchor="middle">gather</text>
    </g>

    <!-- 6 adapter boxes in a row -->
    <g>
      <rect x="80" y="545" width="140" height="60" rx="5" fill="#fff" stroke="#3a7da0"/>
      <text x="150" y="565" class="step" text-anchor="middle">_safe_scan</text>
      <text x="150" y="582" class="step-out" text-anchor="middle">GHSA + OSS Index</text>
      <text x="150" y="596" class="step-out" text-anchor="middle">→ security_advisories</text>
    </g>
    <g>
      <rect x="232" y="545" width="140" height="60" rx="5" fill="#fff" stroke="#3a7da0"/>
      <text x="302" y="565" class="step" text-anchor="middle">_safe_library_health</text>
      <text x="302" y="582" class="step-out" text-anchor="middle">KB + POM + inactivity</text>
      <text x="302" y="596" class="step-out" text-anchor="middle">→ library_health_findings</text>
    </g>
    <g>
      <rect x="384" y="545" width="140" height="60" rx="5" fill="#fff" stroke="#3a7da0"/>
      <text x="454" y="565" class="step" text-anchor="middle">_safe_changelog</text>
      <text x="454" y="582" class="step-out" text-anchor="middle">GitHub release notes</text>
      <text x="454" y="596" class="step-out" text-anchor="middle">→ entries + stats</text>
    </g>
    <g>
      <rect x="536" y="545" width="140" height="60" rx="5" fill="#fff" stroke="#3a7da0"/>
      <text x="606" y="565" class="step" text-anchor="middle">_safe_module_usage</text>
      <text x="606" y="582" class="step-out" text-anchor="middle">build.gradle(.kts) scan</text>
      <text x="606" y="596" class="step-out" text-anchor="middle">→ module_usage_map</text>
    </g>
    <g>
      <rect x="688" y="545" width="140" height="60" rx="5" fill="#fff" stroke="#3a7da0"/>
      <text x="758" y="565" class="step" text-anchor="middle">_safe_license</text>
      <text x="758" y="582" class="step-out" text-anchor="middle">POM &lt;licenses&gt;</text>
      <text x="758" y="596" class="step-out" text-anchor="middle">→ license_audit</text>
    </g>
    <g>
      <rect x="840" y="545" width="140" height="60" rx="5" fill="#fff" stroke="#3a7da0"/>
      <text x="910" y="565" class="step" text-anchor="middle">_safe_version_status</text>
      <text x="910" y="582" class="step-out" text-anchor="middle">maven-metadata.xml</text>
      <text x="910" y="596" class="step-out" text-anchor="middle">→ library_version_statuses</text>
    </g>

    <!-- gather fan-out lines -->
    <g stroke="#3a7da0" stroke-width="1.5" fill="none">
      <path d="M 500,475 Q 150,490 150,540" marker-end="url(#arrow)"/>
      <path d="M 510,500 Q 302,510 302,540" marker-end="url(#arrow)"/>
      <path d="M 530,505 Q 454,520 454,540" marker-end="url(#arrow)"/>
      <path d="M 550,505 Q 606,520 606,540" marker-end="url(#arrow)"/>
      <path d="M 570,500 Q 758,510 758,540" marker-end="url(#arrow)"/>
      <path d="M 580,475 Q 910,490 910,540" marker-end="url(#arrow)"/>
    </g>

    <!-- Phase 1.5 footer inside phase 1 box -->
    <g>
      <rect x="280" y="625" width="520" height="36" rx="5" fill="#fff7e0" stroke="#b88a30"/>
      <text x="540" y="648" class="step" text-anchor="middle">Phase 1.5 — findings += module_usage_map.findings  (MOD-001 contract)</text>
    </g>
  </g>

  <line x1="540" y1="675" x2="540" y2="705" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2 — sequential consumer -->
  <g>
    <rect x="60" y="705" width="960" height="130" rx="10" fill="#ece4f2" stroke="#7d6a99" stroke-width="2"/>
    <rect x="60" y="705" width="190" height="26" rx="4" fill="#7d6a99"/>
    <text x="68" y="724" class="badge">PHASE 2 — SEQUENTIAL</text>
    <text x="260" y="724" class="phase-note">risk_score depends on every Phase 1 output · cannot run concurrently with Phase 1 by data dependency</text>

    <g>
      <rect x="320" y="750" width="440" height="60" rx="5" fill="#fff" stroke="#7d6a99"/>
      <text x="540" y="772" class="step" text-anchor="middle">risk_score_report = score_libraries(libs, all Phase 1 outputs)</text>
      <text x="540" y="792" class="step-out" text-anchor="middle">opt-in via --risk-score · weights + thresholds from AppConfig</text>
    </g>
  </g>

  <line x1="540" y1="835" x2="540" y2="865" stroke="#2a8a3e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Output -->
  <g>
    <rect x="370" y="865" width="340" height="60" rx="6" fill="#e6f2e8" stroke="#2a8a3e" stroke-width="2"/>
    <text x="540" y="888" class="step" text-anchor="middle" font-weight="700">return FreezeReport(...)</text>
    <text x="540" y="908" class="step-out" text-anchor="middle">all 13+ fields populated · consumed by 5 writers</text>
  </g>

  <text x="40" y="980" class="subtitle">Source: src/gradle_deps_monitor/application/generate_freeze_report.py · _safe_* wrappers short-circuit when adapter is None</text>
  <text x="40" y="998" class="subtitle">Empirical: 170-lib catalog cold cache 59 s (pre-RFC-0024) → 12.5 s (post-RFC-0024 PR #1) → 9.74 s (post-RFC-0025)</text>
</svg>
