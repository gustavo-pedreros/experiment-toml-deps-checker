  <text x="775" y="200" class="legend">allowed</text>
  <text x="775" y="216" class="legend">import</text>
  <text x="775" y="232" class="legend">direction</text>
  <text x="775" y="248" class="legend">(top â†’ bottom)</text>

  <!-- Forbidden arrows on the side: presentationâ†’infrastructure, applicationâ†’infrastructure -->
  <g>
    <text x="775" y="320" class="legend-title">Forbidden</text>
    <text x="775" y="336" class="legend">(import-linter)</text>

    <line x1="785" y1="380" x2="785" y2="335" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#forbidden)"/>
    <text x="800" y="360" class="legend">infra â†› presentation</text>

    <line x1="900" y1="295" x2="900" y2="265" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#forbidden)"/>
    <text x="800" y="280" class="legend">presentation â†› infra</text>

    <line x1="900" y1="405" x2="900" y2="295" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#forbidden)"/>
    <text x="800" y="400" class="legend">app â†› infra</text>

    <line x1="900" y1="525" x2="900" y2="405" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#forbidden)"/>
    <text x="800" y="520" class="legend">domain â†› anything</text>
  </g>

  <!-- Footer / source -->
  <text x="40" y="640" class="subtitle">Generated 2026-05-18 Â· source of truth: tool.importlinter contracts in pyproject.toml</text>
