    <text x="80" y="320" class="layer-name">infrastructure</text>
    <text x="80" y="342" class="layer-desc">Adapters that implement application ports (HTTP, file I/O, parsing).</text>
    <text x="80" y="358" class="layer-desc">parsing/ Â· registries/ Â· resolvers/ Â· scanners/ Â· fetchers/ Â·</text>
    <text x="80" y="374" class="layer-desc">checkers/ Â· writers/ Â· loaders/ Â· config/</text>
    <text x="700" y="320" class="role-tag">adapters</text>
  </g>

