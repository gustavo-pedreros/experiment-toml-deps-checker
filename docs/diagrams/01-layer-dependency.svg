<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <title>Layered dependencies (ADR-0006 + import-linter)</title>
  <desc>
    Top-to-bottom stack of the six architecture layers; arrows on the right
    spine show the only allowed direction of import. Red dashed arrows on the
    left annotate the forbidden direction enforced by import-linter contracts
    in pyproject.toml. Source layer "checks" sits parallel to "application":
    both depend only on the domain.
  </desc>

  <defs>
    <marker id="allowed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a8a3e"/>
    </marker>
    <marker id="forbidden" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 20px; font-weight: 600; fill: #1a1a1a; }
    .subtitle { font-size: 12px; fill: #555; }
    .layer-name { font-size: 17px; font-weight: 600; fill: #1a1a1a; }
    .layer-desc { font-size: 12px; fill: #333; }
    .role-tag { font-size: 11px; font-style: italic; fill: #666; text-anchor: end; }
    .legend { font-size: 12px; fill: #333; }
    .legend-title { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
  </style>

  <text x="40" y="40" class="title">Layered Dependencies</text>
  <text x="40" y="60" class="subtitle">ADR-0006 (Pragmatic Clean Architecture) Â· enforced by 5 import-linter contracts in pyproject.toml</text>

  <!-- Layer 1: bootstrap / cli -->
  <g>
