    <text x="80" y="120" class="layer-name">bootstrap / cli</text>
    <text x="80" y="142" class="layer-desc">Composition root. Wires concrete adapters into use cases.</text>
    <text x="80" y="158" class="layer-desc">bootstrap.py Â· cli.py</text>
    <text x="700" y="120" class="role-tag">composition</text>
  </g>

  <!-- Layer 2: presentation -->
  <g>
    <rect x="60" y="190" width="660" height="80" rx="6" fill="#fff3d9" stroke="#b89a4a"/>
    <text x="80" y="220" class="layer-name">presentation</text>
    <text x="80" y="242" class="layer-desc">Typer CLI commands, Rich console summary, severity styling.</text>
    <text x="80" y="258" class="layer-desc">presentation/commands/ Â· presentation/console.py</text>
    <text x="700" y="220" class="role-tag">delivery</text>
